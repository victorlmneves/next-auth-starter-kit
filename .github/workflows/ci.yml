name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

env:
    NODE_VERSION: '20'

jobs:
    lint-and-typecheck:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run TypeScript type check
              run: npm run type-check

            - name: Check formatting
              run: npm run format:check

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test:coverage

            - name: Upload coverage reports
              uses: codecov/codecov-action@v4
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
              if: always()

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest
        needs: unit-tests
        env:
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_AUTH0_ID: ${{ secrets.AUTH_AUTH0_ID }}
            AUTH_AUTH0_SECRET: ${{ secrets.AUTH_AUTH0_SECRET }}
            AUTH_AUTH0_ISSUER: ${{ secrets.AUTH_AUTH0_ISSUER }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Build application
              run: npm run build

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  AUTH_SECRET: dummy-secret-for-build
                  AUTH_AUTH0_ID: dummy-id
                  AUTH_AUTH0_SECRET: dummy-secret
                  AUTH_AUTH0_ISSUER: https://dummy.auth0.com
